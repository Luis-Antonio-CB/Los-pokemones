<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon App - Constructor de Equipos</title>
    <meta name="description" content="Crea tu equipo Pokémon con estadísticas aleatorias">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Constructor de Equipos</h1>
            <p>Selecciona tu equipo de ensueño (Max. 6). 1ra Generación sin legendarios. ¡Sus estadísticas varían en cada selección!</p>
        </header>

        <section class="team-section">
            <div class="team-header">
                <input type="text" id="team-name" placeholder="📝 Escribe un nombre para tu equipo..." class="team-input">
                <div class="counter-box">
                    <span id="count">0</span> / 6
                </div>
            </div>
            
            <div class="team-slots" id="team-slots">
                <div class="empty-state">Tu equipo está vacío. Añade Pokémon desde el catálogo.</div>
            </div>
        </section>
        
        <hr class="divider">

        <section class="catalog-section">
            <h2 class="section-title">Catálogo de Primera Generación</h2>
            <div class="pokemon-grid" id="pokemon-catalog">
                <!-- Se inyectarán los Pokémon vía js -->
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
